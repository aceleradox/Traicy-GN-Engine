project:
  name: Traicy Louise Scenes v2
  mode: scene-vibe-code
  goal: criar e ajustar cenas com economia de créditos de IA para a versão 2
  tools:
    - cline
    - vscode
    - github
  caution: |
    Use este modo para editar cenas do jogo de forma leve e econômica.
    A IA deve sugerir mudanças simples nos JSONs de cena e não inventar fluxos complexos sem aprovação.

resource:
  scenes:
    folder: resource/scenes
    supportedFormats:
      - json

configuration:
  mainConfig: sub-script.json
  sceneConfigPattern: resource/scenes/*.json
  sceneEditorConfig: resource/scenes/scene-editor-config.json
  version: "2"
  editable: true
  preferLocalEdits: true
  optionalAiPrompt: |
    Use este modo para editar a cena principal e outras cenas com foco em simplicidade, edição local e economia de créditos.
