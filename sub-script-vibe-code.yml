project:
  name: Traicy Louise Engine v2
  mode: vibe-code
  goal: adaptar a engine para versão 2, editável e leve, com economia de créditos
  tools:
    - cline
    - vscode
    - github
  caution: |
    Use arquivos JSON e configs locais sempre que possível.
    Mantenha a estrutura simples e editável para Defold, navegador e backend.

resource:
  sprites:
    folder: resource/sprites
    imageFolder: resource/sprites/img
    supportedFormats:
      - png
      - bmp
  maps:
    folder: resource/maps
  scenes:
    folder: resource/scenes
  sounds:
    folder: resource/sounds
  effects:
    folder: resource/effects
  colormod:
    folder: resource/colormod

configuration:
  mainConfig: sub-script.json
  spriteConfigPattern: resource/sprites/*.json
  mapConfigPattern: resource/maps/*.json
  sceneConfigPattern: resource/scenes/*.json
  version: "2"
  editable: true
  preferLocalEdits: true
  creditSaving: true
  optionalAiPrompt: |
    Use este projeto como base para editar sprites, maps, scenes, controls, animation, sounds e effects com economia de créditos.
    Esta versão 2 deve priorizar edição local, estrutura leve e uso de arquivos JSON já existentes.
    Seja objetivo e evite respostas longas ou invenções desnecessárias.
