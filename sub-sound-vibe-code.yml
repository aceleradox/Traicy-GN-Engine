project:
  name: Sprite Easy Sound
  mode: sound-vibe-code
  goal: criar e ajustar sons com economia de créditos de IA
  tools:
    - cline
    - vscode
    - github
  caution: |
    Use este modo para gerar ou editar sons e efeitos sonoros de forma econômica.
    A IA deve sugerir formatos simples e não criar arquivos binários diretamente.

resource:
  sounds:
    folder: resource/sounds
    supportedFormats:
      - wav
      - mp3
      - ogg

configuration:
  mainConfig: sub-script.json
  soundConfigPattern: resource/sounds/*.json
  optionalAiPrompt: |
    Use este modo para ajudar a criar efeitos sonoros e música leve para o jogo.
    Mantenha a resposta objetiva e evite prompts que gastem muitos créditos em sugestões longas.
