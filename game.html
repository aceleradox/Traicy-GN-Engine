<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Canvas em branco para edição de cena, pronto para Defold e recursos do projeto.">
  <title>Editor de Cena</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="editor-shell">
    <header class="topbar">
      <div>
        <h1>Editor de cena</h1>
        <p>Canvas limpo e pronto para montar o jogo. Use os arquivos abaixo como base para editar.</p>
      </div>
      <nav class="resource-links" aria-label="Arquivos do projeto">
        <a href="data/game-config.json" target="_blank" rel="noreferrer">game-config</a>
        <a href="resource/scenes/main.json" target="_blank" rel="noreferrer">scene</a>
        <a href="resource/sprites/player.json" target="_blank" rel="noreferrer">player</a>
        <a href="resource/maps/level-1.json" target="_blank" rel="noreferrer">map</a>
        <a href="game.project" target="_blank" rel="noreferrer">defold</a>
      </nav>
    </header>

    <section class="canvas-card">
      <canvas id="game" width="800" height="450"></canvas>
    </section>

    <p class="status">Modo edição • canvas branco • projeto leve • compatível com Defold</p>
  </main>

  <script src="js/game-data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
